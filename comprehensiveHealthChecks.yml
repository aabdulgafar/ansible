---
- name: Comprehensive Windows Server Health Check (No Collection Dependency)
  hosts: all
  gather_facts: false

  vars:
    smtp_host: "127.0.0.1"
    smtp_port: 1025
    email_to: "admin@company.com"
    email_from: "ansible-noreply@company.com"

  tasks:

    - name: Run comprehensive diagnostics via PowerShell
      ansible.windows.win_powershell:
        script: |
          $diskData = Get-CimInstance Win32_LogicalDisk -Filter "DriveType=3" |
            Select DeviceID,
              @{Name="TotalSizeGB";Expression={[math]::Round($_.Size/1GB,2)}},
              @{Name="FreeSpaceGB";Expression={[math]::Round($_.FreeSpace/1GB,2)}},
              @{Name="FreePercent";Expression={[math]::Round(($_.FreeSpace/$_.Size)*100,2)}}

          $os = Get-CimInstance Win32_OperatingSystem
          $totalRam = [math]::Round($os.TotalVisibleMemorySize/1MB,2)
          $freeRam  = [math]::Round($os.FreePhysicalMemory/1MB,2)
          $usedRam  = $totalRam - $freeRam
          $ramPct   = [math]::Round(($usedRam/$totalRam)*100,2)

          $processes = Get-Process |
            Sort WorkingSet -Descending |
            Select -First 5 Name, Id,
              @{Name="MemoryMB";Expression={[math]::Round($_.WorkingSet/1MB,2)}}

          $ports = Get-NetTCPConnection -State Listen |
            Select LocalAddress, LocalPort

          $uptime = (Get-Date) - $os.LastBootUpTime

          $Ansible.Result = @{
            Disks = $diskData
            Ram = @{Total=$totalRam; Free=$freeRam; Used=$usedRam; Percent=$ramPct}
            Processes = $processes
            Ports = $ports
            Uptime = "$($uptime.Days) Days"
            ComputerName = $env:COMPUTERNAME
          }
      register: health

    - name: Build HTML report
      ansible.windows.win_powershell:
        script: |
          $h = '{{ health.result | to_json }}' | ConvertFrom-Json

          $html = "<h2>Server: $($h.ComputerName)</h2>"
          $html += "<p>Uptime: $($h.Uptime)</p>"
          $html += "<p>RAM Usage: $($h.Ram.Percent)%</p>"

          $html += "<h3>Disks</h3><ul>"
          foreach ($d in $h.Disks) {
            $html += "<li>$($d.DeviceID) - $($d.FreePercent)% free</li>"
          }
          $html += "</ul>"

          $Ansible.Result = @{ Html = $html }
      register: report

    - name: Send email using PowerShell (NO Ansible mail module)
      ansible.windows.win_powershell:
        script: |
          $smtpServer = "{{ smtp_host }}"
          $smtpPort   = {{ smtp_port }}
          $to         = "{{ email_to }}"
          $from       = "{{ email_from }}"
          $subject    = "Health Report - {{ health.result.ComputerName }}"
          $body       = @"
          {{ report.result.Html }}
          "@

          Send-MailMessage `
            -To $to `
            -From $from `
            -Subject $subject `
            -Body $body `
            -BodyAsHtml `
            -SmtpServer $smtpServer `
            -Port $smtpPort


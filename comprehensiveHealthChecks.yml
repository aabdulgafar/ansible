---
- name: Comprehensive Windows Server Health Check (Stable YAML-safe version)
  hosts: all
  gather_facts: false

  vars:
    smtp_host: "127.0.0.1"
    smtp_port: 1025
    email_to: "admin@company.com"
    email_from: "ansible-noreply@company.com"

  tasks:

    - name: Run diagnostics
      ansible.windows.win_powershell:
        script: |
          $diskData = Get-CimInstance Win32_LogicalDisk -Filter "DriveType=3" |
            Select DeviceID,
              @{Name="TotalSizeGB";Expression={[math]::Round($_.Size/1GB,2)}},
              @{Name="FreeSpaceGB";Expression={[math]::Round($_.FreeSpace/1GB,2)}},
              @{Name="FreePercent";Expression={[math]::Round(($_.FreeSpace/$_.Size)*100,2)}}

          $os = Get-CimInstance Win32_OperatingSystem

          $totalRam = [math]::Round($os.TotalVisibleMemorySize/1MB,2)
          $freeRam  = [math]::Round($os.FreePhysicalMemory/1MB,2)
          $usedRam  = $totalRam - $freeRam
          $ramPct   = [math]::Round(($usedRam/$totalRam)*100,2)

          $processes = Get-Process |
            Sort WorkingSet -Descending |
            Select -First 5 Name, Id,
              @{Name="MemoryMB";Expression={[math]::Round($_.WorkingSet/1MB,2)}}

          $ports = Get-NetTCPConnection -State Listen |
            Select LocalAddress, LocalPort

          $uptime = (Get-Date) - $os.LastBootUpTime

          $Ansible.Result = @{
            Disks = $diskData
            Ram = @{
              Total = $totalRam
              Free = $freeRam
              Used = $usedRam
              Percent = $ramPct
            }
            Processes = $processes
            Ports = $ports
            Uptime = "$($uptime.Days) Days, $($uptime.Hours) Hours"
            ComputerName = $env:COMPUTERNAME
          }
      register: health

    - name: Build HTML safely (NO YAML parsing of HTML)
      ansible.windows.win_powershell:
        script: |
          $h = '{{ health.result | to_json }}' | ConvertFrom-Json

          $diskRows = ""
          foreach ($d in $h.Disks) {
            $style = ""
            if ($d.FreePercent -lt 15) {
              $style = "style='color:red;font-weight:bold;'"
            }

            $diskRows += "<tr>
              <td>$($d.DeviceID)</td>
              <td>$($d.TotalSizeGB)</td>
              <td>$($d.FreeSpaceGB)</td>
              <td $style>$($d.FreePercent)%</td>
            </tr>"
          }

          $processRows = ""
          foreach ($p in $h.Processes) {
            $processRows += "<tr>
              <td>$($p.Name)</td>
              <td>$($p.Id)</td>
              <td>$($p.MemoryMB)</td>
            </tr>"
          }

          $portRows = ""
          foreach ($p in $h.Ports) {
            $portRows += "<tr>
              <td>$($p.LocalPort)</td>
              <td>$($p.LocalAddress)</td>
              <td></td>
            </tr>"
          }

          # IMPORTANT FIX: single-quoted here-string (YAML-safe)
          $html = @'
<html>
  <body style="font-family:Segoe UI">

    <h2>Server Health Report: {{ health.result.ComputerName }}</h2>

    <p><b>Uptime:</b> {{ health.result.Uptime }}</p>

    <h3>RAM</h3>
    <p>{{ health.result.Ram.Percent }}% used</p>

    <h3>Disks</h3>
    <table border="1">
      <tr><th>Drive</th><th>Total</th><th>Free</th><th>%</th></tr>
      $diskRows
    </table>

    <h3>Processes</h3>
    <table border="1">
      <tr><th>Name</th><th>PID</th><th>RAM</th></tr>
      $processRows
    </table>

    <h3>Ports</h3>
    <table border="1">
      <tr><th>Port</th><th>Address</th><th>Process</th></tr>
      $portRows
    </table>

  </body>
</html>
'@

          $Ansible.Result = @{
            Html = $html
            ComputerName = $h.ComputerName
          }
      register: report

    - name: Send email (PowerShell SMTP)
      ansible.windows.win_powershell:
        script: |
          $smtp = "{{ smtp_host | string }}"
          $port = "{{ smtp_port | string }}"
          $to   = "{{ email_to | string }}"
          $from = "{{ email_from | string }}"

          $subject = "Health Report - {{ report.result.ComputerName }}"

          $body = @'
{{ report.result.Html }}
'@

          Send-MailMessage `
            -To $to `
            -From $from `
            -Subject $subject `
            -Body $body `
            -BodyAsHtml `
            -SmtpServer $smtp `
            -Port $port

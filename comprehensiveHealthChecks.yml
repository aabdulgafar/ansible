---
- name: Windows Basic Health Check
  hosts: windows
  gather_facts: no
  tasks:
    - name: Get CPU usage
      win_shell: Get-WmiObject win32_processor | Measure-Object -Property LoadPercentage -Average | Select -ExpandProperty Average
      register: cpu_usage

    - name: Get Memory usage
      win_shell: |
        $mem = Get-WmiObject win32_operatingsystem
        [math]::Round((($mem.TotalVisibleMemorySize - $mem.FreePhysicalMemory) / $mem.TotalVisibleMemorySize) * 100, 2)
      register: mem_usage

    - name: Get Disk usage (C:)
      win_shell: |
        $disk = Get-WmiObject Win32_LogicalDisk -Filter "DeviceID='C:'"
        [math]::Round((($disk.Size - $disk.FreeSpace) / $disk.Size) * 100, 2)
      register: disk_usage

    - name: Show results
      debug:
        msg:
          - "CPU Usage: {{ cpu_usage.stdout }}%"
          - "Memory Usage: {{ mem_usage.stdout }}%"
          - "Disk Usage (C:): {{ disk_usage.stdout }}%"

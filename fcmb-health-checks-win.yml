---
- name: Windows Basic Health Check
  hosts: all
  gather_facts: no

  vars:
    cpu_threshold: 85
    mem_threshold: 90
    disk_threshold: 90

  tasks:

    - name: Get CPU usage
      win_shell: |
        (Get-WmiObject win32_processor | Measure-Object -Property LoadPercentage -Average).Average
      register: cpu_usage

    - name: Get Memory usage
      win_shell: |
        $mem = Get-WmiObject win32_operatingsystem
        [math]::Round((($mem.TotalVisibleMemorySize - $mem.FreePhysicalMemory) / $mem.TotalVisibleMemorySize) * 100, 2)
      register: mem_usage

    - name: Get Disk usage (C:)
      win_shell: |
        $disk = Get-WmiObject Win32_LogicalDisk -Filter "DeviceID='C:'"
        [math]::Round((($disk.Size - $disk.FreeSpace) / $disk.Size) * 100, 2)
      register: disk_usage

    - name: Convert values to usable numbers (clean + safe)
      set_fact:
        cpu: "{{ cpu_usage.stdout | trim | float }}"
        mem: "{{ mem_usage.stdout | trim | float }}"
        disk: "{{ disk_usage.stdout | trim | float }}"

    - name: Determine statuses (type-safe comparison)
      set_fact:
        cpu_status: "{{ 'OK' if (cpu | float) < (cpu_threshold | float) else 'HIGH' }}"
        mem_status: "{{ 'OK' if (mem | float) < (mem_threshold | float) else 'HIGH' }}"
        disk_status: "{{ 'OK' if (disk | float) < (disk_threshold | float) else 'HIGH' }}"

    - name: Build HTML report
      set_fact:
        health_report: |
          <h2>Windows Health Check Report - {{ inventory_hostname }}</h2>
          <table border="1" cellpadding="5" cellspacing="0">
            <tr>
              <th>Metric</th>
              <th>Usage (%)</th>
              <th>Threshold (%)</th>
              <th>Status</th>
            </tr>
            <tr>
              <td>CPU</td>
              <td>{{ cpu }}</td>
              <td>{{ cpu_threshold }}</td>
              <td>{{ cpu_status }}</td>
            </tr>
            <tr>
              <td>Memory</td>
              <td>{{ mem }}</td>
              <td>{{ mem_threshold }}</td>
              <td>{{ mem_status }}</td>
            </tr>
            <tr>
              <td>Disk (C:)</td>
              <td>{{ disk }}</td>
              <td>{{ disk_threshold }}</td>
              <td>{{ disk_status }}</td>
            </tr>
          </table>

    - name: Show report (used by AWX notification)
      debug:
        msg: "{{ health_report }}"

---
- name: Check Windows Disk Sizes and Email Results Natively
  hosts: all
  gather_facts: false
  vars:
    # Gmail Configuration Settings
    gmail_username: "aabdulgafar2015@gmail.com"
    gmail_app_password: "mako ezhe ippy payz"  # 16-character App Password from Google
    email_to: "aabdulgafar2015@gmail.com"

  tasks:
    - name: Get disk space details via PowerShell
      ansible.windows.win_powershell:
        script: |
          Get-CimInstance -ClassName Win32_LogicalDisk -Filter "DriveType=3" | 
          Select-Object DeviceID, 
                        @{Name="TotalSizeGB";Expression={[math]::Round($_.Size / 1GB, 2)}}, 
                        @{Name="FreeSpaceGB";Expression={[math]::Round($_.FreeSpace / 1GB, 2)}}, 
                        @{Name="FreePercent";Expression={[math]::Round(($_.FreeSpace / $_.Size) * 100, 2)}}
      register: disk_output

    - name: Send disk space report via email natively using PowerShell
      ansible.windows.win_powershell:
        script: |
          # Convert Ansible JSON data back into a PowerShell object array
          $disks = '{{ disk_output.output | to_json }}' | ConvertFrom-Json

          # Build an HTML Table dynamically from the disk data
          $tableRows = ""
          foreach ($drive in $disks) {
              # If free space is less than 15%, highlight it in bold red text
              $style = ""
              if ($drive.FreePercent -lt 15) { $style = "style='color: red; font-weight: bold;'" }

              $tableRows += "<tr>
                  <td><b>$($drive.DeviceID)</b></td>
                  <td>$($drive.TotalSizeGB) GB</td>
                  <td>$($drive.FreeSpaceGB) GB</td>
                  <td $style>$($drive.FreePercent)%</td>
              </tr>"
          }

          # Complete HTML body formatting
          $htmlBody = @"
          <html>
            <body style="font-family: Arial, sans-serif;">
              <h2>Disk Space Report for Server: $env:COMPUTERNAME</h2>
              <table border="1" cellpadding="5" style="border-collapse: collapse;">
                <tr style="background-color: #f2f2f2;">
                  <th>Drive</th>
                  <th>Total Size (GB)</th>
                  <th>Free Space (GB)</th>
                  <th>Free Space (%)</th>
                </tr>
                $tableRows
              </table>
              <p><i>Report generated by Ansible using native Windows PowerShell.</i></p>
            </body>
          </html>
          "@

          # Securely convert your App Password for authentication
          $secpasswd = ConvertTo-SecureString "{{ gmail_app_password }}" -AsPlainText -Force
          $mycreds = New-Object System.Management.Automation.PSCredential ("{{ gmail_username }}", $secpasswd)
          
          # Configure explicit Gmail SMTP parameters
          $mailParams = @{
              From       = "{{ gmail_username }}"
              To         = "{{ email_to }}"
              Subject    = "Disk Space Report for $env:COMPUTERNAME"
              Body       = $htmlBody
              BodyAsHtml = $true   # Tells Gmail to render the HTML structure instead of raw text
              SmtpServer = "smtp.gmail.com"
              Port       = 587
              UseSSL     = $true
              Credential = $mycreds
          }
          
          # Dispatch email natively from the Windows host
          Send-MailMessage @mailParams

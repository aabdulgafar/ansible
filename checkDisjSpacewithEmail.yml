---
- name: Check Windows Disk Sizes and Email Results
  hosts: all
  gather_facts: false

  tasks:
    - name: Get disk space details via PowerShell
      ansible.windows.win_powershell:
        script: |
          Get-CimInstance -ClassName Win32_LogicalDisk -Filter "DriveType=3" | 
          Select-Object DeviceID, 
                        @{Name="TotalSizeGB";Expression={[math]::Round($_.Size / 1GB, 2)}}, 
                        @{Name="FreeSpaceGB";Expression={[math]::Round($_.FreeSpace / 1GB, 2)}}, 
                        @{Name="FreePercent";Expression={[math]::Round(($_.FreeSpace / $_.Size) * 100, 2)}}
      register: disk_output

    - name: Send disk space report via email
      community.general.mail:
        host: "smtp.yourmailserver.com"      # <-- Change to your SMTP server
        port: 587                            # <-- Change to your SMTP port (e.g., 25, 465, 587)
        username: "your_username"            # <-- Optional: SMTP username
        password: "your_password"            # <-- Optional: SMTP password
        secure: starttls                     # <-- Optional: 'try', 'starttls', or 'always'
        from: "ansible-alerts@yourdomain.com"
        to: "your_email@yourdomain.com"      # <-- Your email address
        subject: "Disk Space Report for {{ inventory_hostname }}"
        subtype: html
        body: |
          <html>
            <body>
              <h2>Disk Space Report for Server: {{ inventory_hostname }}</h2>
              <table border="1" cellpadding="5" style="border-collapse: collapse;">
                <tr style="background-color: #f2f2f2;">
                  <th>Drive</th>
                  <th>Total Size (GB)</th>
                  <th>Free Space (GB)</th>
                  <th>Free Space (%)</th>
                </tr>
                {% for drive in disk_output.output %}
                <tr>
                  <td><b>{{ drive.DeviceID }}</b></td>
                  <td>{{ drive.TotalSizeGB }} GB</td>
                  <td>{{ drive.FreeSpaceGB }} GB</td>
                  <td style="{% if drive.FreePercent < 15 %}color: red; font-weight: bold;{% endif %}">
                    {{ drive.FreePercent }}%
                  </td>
                </tr>
                {% endfor %}
              </table>
              <p><i>Report generated by Ansible</i></p>
            </body>
          </html>
      delegate_to: localhost

---
- name: Check and Start Windows Services if Not Running
  hosts: all
  gather_facts: no

  vars:
    service_list: {{ service_list }}
    

  tasks:
    - name: Gather current status of services
      ansible.windows.win_service_info:
        name: "{{ item }}"
      loop: "{{ service_list }}"
      register: service_info_results

    - name: Start services that are not currently running
      ansible.windows.win_service:
        name: "{{ item.item }}"
        state: started
      loop: "{{ service_info_results.results }}"
      # FIXED: Dig into the 'services' list returned by the module
      when: 
        - item.exists
        - item.services | length > 0
        - item.services[0].state != 'running'
      register: start_results
      ignore_errors: yes

    - name: Build lists of actions taken
      ansible.builtin.set_fact:
        # FIXED: Check the first element of the services array
        already_running_services: >-
          {{ service_info_results.results | 
             selectattr('exists') | 
             selectattr('services', 'defined') | 
             selectattr('services', 'any', has_member={'state': 'running'}) | 
             map(attribute='item') | list }}

        started_services: "{{ start_results.results | selectattr('changed', 'defined') | selectattr('changed') | selectattr('failed', 'equalto', false) | map(attribute='item') | list }}"
        failed_to_start_services: "{{ start_results.results | selectattr('failed', 'defined') | selectattr('failed') | map(attribute='item') | list }}"

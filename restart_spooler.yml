---
- name: Restart Print Spooler Service Runbook
  hosts: windows
  gather_facts: no

  tasks:
    - name: Check Spooler service status (before)
      win_service:
        name: Spooler
      register: spooler_before

    - name: Show current status
      debug:
        msg: "Spooler state before restart: {{ spooler_before.state }}"

    - name: Restart Print Spooler service
      win_service:
        name: Spooler
        state: restarted

    - name: Check Spooler service status (after)
      win_service:
        name: Spooler
      register: spooler_after

    - name: Confirm service is running
      assert:
        that:
          - spooler_after.state == "running"
        fail_msg: "Spooler failed to restart!"
        success_msg: "Spooler restarted successfully!"
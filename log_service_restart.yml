---
- name: Monitor log file delay and restart Windows service
  hosts: all
  gather_facts: no
  vars:
    log_file_path: "C:\\scripts\\log.log"
    service_name: "Spooler"
    time_threshold_seconds: 300  # 5 minutes

    # Gmail Configuration Settings
    gmail_username: "aabdulgafar2015@gmail.com"
    gmail_app_password: "mako ezhe ippy payz"  # 16-character App Password from Google
    email_to: "aabdulgafar2015@gmail.com"

  tasks:
    - name: Get log time and system time via PowerShell (Backwards Compatible)
      ansible.windows.win_powershell:
        script: |
          $line = Get-Content -Path "{{ log_file_path }}" -Tail 1
          
          # Match YYYY-MM-DD HH:MM:SS format
          if ($line -match '(\d{4}-\d{2}-\d{2} \d{2}:\d{2}:\d{2})') {
              # Parse the log time
              $logTime = [datetime]::ParseExact($matches[1], "yyyy-MM-dd HH:mm:ss", $null)
              
              # Get current Windows system time
              $systemTime = Get-Date

              # Old-school Epoch calculation (Compatible with PowerShell 5.1)
              $epochOrigin = New-Object DateTime 1970, 1, 1, 0, 0, 0, ([DateTimeKind]::Utc)
              
              $logEpoch = [Math]::Floor(($logTime.ToUniversalTime() - $epochOrigin).TotalSeconds)
              $systemEpoch = [Math]::Floor(($systemTime.ToUniversalTime() - $epochOrigin).TotalSeconds)
              
              $Ansible.Changed = $false
              $Ansible.Result = @{ 
                  log_epoch = $logEpoch
                  system_epoch = $systemEpoch
              }
          } else {
              throw "Could not parse timestamp from the last log line."
          }
      register: log_parse_result

    - name: Calculate time difference
      ansible.builtin.set_fact:
        time_difference: "{{ log_parse_result.result.system_epoch | int - log_parse_result.result.log_epoch | int }}"

    - name: Debug time difference
      ansible.builtin.debug:
        msg: "Log is lagging behind system time by {{ time_difference }} seconds."

    - name: Restart Windows Service if lag exceeds 5 minutes
      ansible.windows.win_service:
        name: "{{ service_name }}"
        state: restarted
      when: time_difference | int > time_threshold_seconds | int
      register: service_restart_status

    - name: Send Gmail notification via PowerShell (No external collections needed)
      ansible.windows.win_powershell:
        script: |
          # Securely convert your App Password for authentication
          $secpasswd = ConvertTo-SecureString "{{ gmail_app_password }}" -AsPlainText -Force
          $mycreds = New-Object System.Management.Automation.PSCredential ("{{ gmail_username }}", $secpasswd)
          
          # Configure explicit Gmail SMTP parameters
          $mailParams = @{
              From       = "{{ gmail_username }}"
              To         = "{{ email_to }}"
              Subject    = "ALERT: Service {{ service_name }} restarted on $env:COMPUTERNAME"
              Body       = "Automated Alert from Ansible:`n`nThe log file '{{ log_file_path }}' was lagging behind system time by {{ time_difference }} seconds.`n`nAs a result, the Windows service '{{ service_name }}' was successfully restarted."
              SmtpServer = "smtp.gmail.com"
              Port       = 587
              UseSSL     = $true
              Credential = $mycreds
          }
          
          # Dispatch email natively from the Windows host
          Send-MailMessage @mailParams
      when: 
        - time_difference | int > time_threshold_seconds | int
        - service_restart_status is succeeded

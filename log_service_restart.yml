---
- name: Monitor log file delay and restart Windows service
  hosts: all
  gather_facts: no
  vars:
    log_file_path: "C:\\scripts\\log.log"
    service_name: "MyApplicationService"
    time_threshold_seconds: 300  # 5 minutes

  tasks:
    - name: Get log time and system time via PowerShell
      ansible.windows.win_powershell:
        script: |
          $line = Get-Content -Path "{{ log_file_path }}" -Tail 1
          
          # Match YYYY-MM-DD HH:MM:SS format
          if ($line -match '(\d{4}-\d{2}-\d{2} \d{2}:\d{2}:\d{2})') {
              # Parse the log time
              $logTime = [datetime]::ParseExact($matches[1], "yyyy-MM-dd HH:mm:ss", $null)
              $logEpoch = [DateTimeOffset]$logTime | Select-Object -ExpandProperty ToUnixTimeSeconds
              
              # Get current Windows system time in Epoch seconds
              $systemEpoch = [DateTimeOffset]::Now.ToUnixTimeSeconds()
              
              $Ansible.Changed = $false
              $Ansible.Result = @{ 
                  log_epoch = $logEpoch
                  system_epoch = $systemEpoch
              }
          } else {
              throw "Could not parse timestamp from the last log line."
          }
      register: log_parse_result

    - name: Calculate time difference
      ansible.builtin.set_fact:
        time_difference: "{{ log_parse_result.result.system_epoch | int - log_parse_result.result.log_epoch | int }}"

    - name: Debug time difference
      ansible.builtin.debug:
        msg: "Log is lagging behind system time by {{ time_difference }} seconds."

    - name: Restart Windows Service if lag exceeds 5 minutes
      ansible.windows.win_service:
        name: "{{ service_name }}"
        state: restarted
      when: time_difference | int > time_threshold_seconds | int_seconds | int

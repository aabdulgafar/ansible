---
- name: Windows Fleet Health (Simple + Stable)
  hosts: all
  gather_facts: no

  vars:
    gmail_username: "aabdulgafar2015@gmail.com"
    gmail_app_password: "mako ezhe ippy payz"
    email_to: "aabdulgafar2015@gmail.com"

  tasks:

    # =========================
    # 1. DISK DATA
    # =========================
    - name: Get disk info
      ansible.windows.win_powershell:
        script: |
          Get-CimInstance Win32_LogicalDisk -Filter "DriveType=3" |
          Select-Object DeviceID,
            @{Name="SizeGB";Expression={[math]::Round($_.Size/1GB,2)}},
            @{Name="FreeGB";Expression={[math]::Round($_.FreeSpace/1GB,2)}},
            @{Name="FreePct";Expression={[math]::Round(($_.FreeSpace/$_.Size)*100,2)}}
      register: disk_output

    # =========================
    # 2. BUILD HTML PER HOST
    # =========================
    - name: Build HTML per host
      ansible.windows.win_powershell:
        script: |
          $disk = '{{ disk_output.output | to_json }}' | ConvertFrom-Json

          $rows = ""

          foreach ($d in $disk) {
              $color = if ($d.FreePct -lt 15) { "style='color:red;font-weight:bold;'" } else { "" }

              $rows += "<tr>
                <td>$($d.DeviceID)</td>
                <td>$($d.SizeGB)</td>
                <td>$($d.FreeGB)</td>
                <td $color>$($d.FreePct)</td>
              </tr>"
          }

          $html = @"
          <h3>$env:COMPUTERNAME</h3>
          <table border='1'>
          <tr><th>Drive</th><th>Total</th><th>Free</th><th>%</th></tr>
          $rows
          </table>
          "@

          $html
      register: html_per_host

    # =========================
    # 3. STORE SAFE RESULT
    # =========================
    - name: Save host result
      set_fact:
        host_report: "{{ html_per_host.stdout }}"

    # =========================
    # 4. BUILD FINAL REPORT (RUN ON WINDOWS, NOT LOCALHOST)
    # =========================
    - name: Combine and email (run once)
      run_once: true
      ansible.windows.win_powershell:
        script: |
          $all = ""

          {% for host in ansible_play_hosts %}
          $all += "{{ hostvars[host].host_report }}"
          {% endfor %}

          $final = @"
          <html>
          <body>
          <h1>Windows Fleet Disk Report</h1>
          $all
          </body>
          </html>
          "@

          $sec = ConvertTo-SecureString "{{ gmail_app_password }}" -AsPlainText -Force
          $cred = New-Object PSCredential("{{ gmail_username }}", $sec)

          Send-MailMessage `
            -From "{{ gmail_username }}" `
            -To "{{ email_to }}" `
            -Subject "Windows Fleet Health Report" `
            -Body $final `
            -BodyAsHtml `
            -SmtpServer "smtp.gmail.com" `
            -Port 587 `
            -UseSSL `
            -Credential $cred

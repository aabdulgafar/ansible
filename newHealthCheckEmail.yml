---
- name: Windows Fleet Full Health Monitoring Report
  hosts: all
  gather_facts: false

  vars:
    gmail_username: "aabdulgafar2015@gmail.com"
    gmail_app_password: "mako ezhe ippy payz"
    email_to: "aabdulgafar2015@gmail.com"

  tasks:

    # =========================
    # SYSTEM METRICS COLLECTION
    # =========================

    - name: Get full system metrics
      ansible.windows.win_powershell:
        script: |
          # CPU Usage
          $cpu = (Get-Counter '\Processor(_Total)\% Processor Time').CounterSamples.CookedValue

          # Memory Usage
          $os = Get-CimInstance Win32_OperatingSystem
          $totalMem = [math]::Round($os.TotalVisibleMemorySize / 1MB, 2)
          $freeMem = [math]::Round($os.FreePhysicalMemory / 1MB, 2)
          $usedMemPct = [math]::Round((($totalMem - $freeMem) / $totalMem) * 100, 2)

          # Disk Info
          $disks = Get-CimInstance Win32_LogicalDisk -Filter "DriveType=3" | ForEach-Object {
            [PSCustomObject]@{
              DeviceID = $_.DeviceID
              SizeGB = [math]::Round($_.Size / 1GB, 2)
              FreeGB = [math]::Round($_.FreeSpace / 1GB, 2)
              FreePct = [math]::Round(($_.FreeSpace / $_.Size) * 100, 2)
            }
          }

          # Services (Stopped critical ones)
          $services = Get-Service | Where-Object {$_.Status -ne "Running"} | Select -First 5 Name, Status

          # Top Processes by CPU
          $processes = Get-Process | Sort-Object CPU -Descending | Select -First 5 Name, CPU

          # Event Logs (Last 5 errors)
          $events = Get-EventLog -LogName System -EntryType Error -Newest 5 | Select TimeGenerated, Message

          # Windows Updates
          $updates = (Get-Service wuauserv).Status

          # Output JSON
          [PSCustomObject]@{
            CPU = [math]::Round($cpu,2)
            TotalMem = $totalMem
            FreeMem = $freeMem
            UsedMemPct = $usedMemPct
            Disks = $disks
            Services = $services
            Processes = $processes
            Events = $events
            Updates = $updates
          } | ConvertTo-Json -Depth 4

      register: system_data

    # =========================
    # SAVE CLEAN JSON
    # =========================

    - name: Save parsed data
      set_fact:
        parsed: "{{ system_data.output | join('') | from_json }}"

    # =========================
    # BUILD HTML PER HOST
    # =========================

    - name: Build HTML report per host
      set_fact:
        host_report: |
          <h2>{{ inventory_hostname }}</h2>

          <h3>System Monitoring</h3>
          <p><b>CPU Usage:</b> {{ parsed.CPU }}%</p>
          <p><b>Memory Usage:</b> {{ parsed.UsedMemPct }}%</p>

          <h3>Disk Space</h3>
          <table border="1" cellpadding="5">
          <tr><th>Drive</th><th>Total</th><th>Free</th><th>%</th></tr>
          {% for d in parsed.Disks %}
          <tr>
            <td>{{ d.DeviceID }}</td>
            <td>{{ d.SizeGB }} GB</td>
            <td>{{ d.FreeGB }} GB</td>
            <td {% if d.FreePct < 15 %}style="color:red;font-weight:bold"{% endif %}>
              {{ d.FreePct }}%
            </td>
          </tr>
          {% endfor %}
          </table>

          <h3>Service Health</h3>
          <ul>
          {% for s in parsed.Services %}
            <li>{{ s.Name }} - {{ s.Status }}</li>
          {% endfor %}
          </ul>

          <h3>Top Processes</h3>
          <ul>
          {% for p in parsed.Processes %}
            <li>{{ p.Name }} (CPU: {{ p.CPU }})</li>
          {% endfor %}
          </ul>

          <h3>Recent System Errors</h3>
          <ul>
          {% for e in parsed.Events %}
            <li>{{ e.TimeGenerated }} - {{ e.Message[:100] }}</li>
          {% endfor %}
          </ul>

          <h3>Windows Update Service</h3>
          <p>Status: {{ parsed.Updates }}</p>

    # =========================
    # COMBINE ALL HOSTS
    # =========================

    - name: Combine all host reports
      run_once: true
      set_fact:
        final_report: |
          <html>
          <body style="font-family:Arial">
          <h1>Windows Fleet Health Report</h1>
          {% for host in ansible_play_hosts %}
            {{ hostvars[host].host_report }}
            <hr>
          {% endfor %}
          </body>
          </html>

    # =========================
    # SEND EMAIL FROM WINDOWS
    # =========================

    - name: Send email
      run_once: true
      delegate_to: "{{ groups['all'][0] }}"
      ansible.windows.win_powershell:
        script: |
          $body = @"
          {{ final_report }}
          "@

          $secpasswd = ConvertTo-SecureString "{{ gmail_app_password }}" -AsPlainText -Force
          $creds = New-Object System.Management.Automation.PSCredential ("{{ gmail_username }}", $secpasswd)

          Send-MailMessage `
            -From "{{ gmail_username }}" `
            -To "{{ email_to }}" `
            -Subject "Windows Fleet Health Report" `
            -Body $body `
            -BodyAsHtml `
            -SmtpServer "smtp.gmail.com" `
            -Port 587 `
            -UseSsl `
            -Credential $creds


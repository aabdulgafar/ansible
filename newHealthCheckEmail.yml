---
- name: Windows Fleet Disk Health Report (Stable AWX Version)
  hosts: all
  gather_facts: no

  vars:
    gmail_username: "aabdulgafar2015@gmail.com"
    gmail_app_password: "mako ezhe ippy payz"
    email_to: "aabdulgafar2015@gmail.com"

  tasks:

    # =========================
    # 1. COLLECT DISK DATA (SAFE)
    # =========================
    - name: Get disk info
      ansible.windows.win_powershell:
        script: |
          Get-CimInstance Win32_LogicalDisk -Filter "DriveType=3" |
          Select-Object DeviceID,
            @{Name="SizeGB";Expression={[math]::Round($_.Size/1GB,2)}},
            @{Name="FreeGB";Expression={[math]::Round($_.FreeSpace/1GB,2)}},
            @{Name="FreePct";Expression={[math]::Round(($_.FreeSpace/$_.Size)*100,2)}} |
          ConvertTo-Json -Depth 2
      register: disk_output

    # =========================
    # 2. BUILD SAFE HTML PER HOST (NO stdout DEPENDENCY)
    # =========================
    - name: Build host HTML safely
      ansible.windows.win_powershell:
        script: |
          $disks = ConvertFrom-Json @'
          {{ disk_output.output | to_json }}
          '@

          $rows = ""

          foreach ($d in $disks) {
              $style = ""
              if ($d.FreePct -lt 15) {
                  $style = "style='color:red;font-weight:bold;'"
              }

              $rows += "<tr>
                  <td>$($d.DeviceID)</td>
                  <td>$($d.SizeGB)</td>
                  <td>$($d.FreeGB)</td>
                  <td $style>$($d.FreePct)</td>
              </tr>"
          }

          $html = "<h3>Server: $env:COMPUTERNAME</h3>
          <table border='1'>
          <tr><th>Drive</th><th>Total</th><th>Free</th><th>%</th></tr>
          $rows
          </table>"

          $html
      register: html_per_host

    # =========================
    # 3. BUILD FLEET REPORT (SAFE AGGREGATION)
    # =========================
    - name: Build fleet-wide report (NO stdout usage)
      run_once: true
      delegate_to: localhost
      ansible.builtin.shell: |
        powershell -NoProfile -ExecutionPolicy Bypass -Command "

        $all = @()

        {% for host in ansible_play_hosts %}
        $all += @'
        {{ hostvars[host].html_per_host.stdout | default('NO DATA FROM HOST') }}
        '@
        {% endfor %}

        $final = @'
        <html>
        <body style='font-family:Arial;'>
        <h1>Windows Fleet Disk Health Report</h1>
        $($all -join '<hr>')
        </body>
        </html>
        '@

        $final | Out-File C:\temp\fleet_report.html -Encoding UTF8
        "
      args:
        executable: /bin/bash

    # =========================
    # 4. SEND EMAIL (YOUR WORKING METHOD)
    # =========================
    - name: Send ONE consolidated email via Windows SMTP
      run_once: true
      ansible.windows.win_powershell:
        script: |
          $body = Get-Content "C:\temp\fleet_report.html" -Raw

          $secpasswd = ConvertTo-SecureString "{{ gmail_app_password }}" -AsPlainText -Force
          $cred = New-Object System.Management.Automation.PSCredential ("{{ gmail_username }}", $secpasswd)

          Send-MailMessage `
            -From "{{ gmail_username }}" `
            -To "{{ email_to }}" `
            -Subject "Windows Fleet Disk Health Report" `
            -Body $body `
            -BodyAsHtml `
            -SmtpServer "smtp.gmail.com" `
            -Port 587 `
            -UseSSL `
            -Credential $cred

---
- name: Windows Fleet Disk Report (Single Email via Windows PowerShell)
  hosts: all
  gather_facts: false

  vars:
    gmail_username: "aabdulgafar2015@gmail.com"
    gmail_app_password: "mako ezhe ippy payz"
    email_to: "aabdulgafar2015@gmail.com"

  tasks:

    # =========================
    # 1. GET DISK INFO (ALL HOSTS)
    # =========================
    - name: Get disk space details
      ansible.windows.win_powershell:
        script: |
          Get-CimInstance -ClassName Win32_LogicalDisk -Filter "DriveType=3" |
          Select-Object DeviceID,
            @{Name="TotalSizeGB";Expression={[math]::Round($_.Size / 1GB, 2)}},
            @{Name="FreeSpaceGB";Expression={[math]::Round($_.FreeSpace / 1GB, 2)}},
            @{Name="FreePercent";Expression={[math]::Round(($_.FreeSpace / $_.Size) * 100, 2)}}
      register: disk_output

    # =========================
    # 2. BUILD HTML PER HOST
    # =========================
    - name: Build HTML report per server
      ansible.windows.win_powershell:
        script: |
          $disks = '{{ disk_output.output | to_json }}' | ConvertFrom-Json

          $rows = ""

          foreach ($d in $disks) {
              $style = ""
              if ($d.FreePercent -lt 15) {
                  $style = "style='color:red;font-weight:bold;'"
              }

              $rows += "<tr>
                  <td>$($d.DeviceID)</td>
                  <td>$($d.TotalSizeGB)</td>
                  <td>$($d.FreeSpaceGB)</td>
                  <td $style>$($d.FreePercent)</td>
              </tr>"
          }

          $html = "<h3>$env:COMPUTERNAME</h3>
          <table border='1'>
          <tr><th>Drive</th><th>Total</th><th>Free</th><th>%</th></tr>
          $rows
          </table>"

          $html
      register: html_per_host

    # =========================
    # 3. COLLECT ALL HOST RESULTS
    # =========================
    - name: Build final fleet report (run once on first host)
      run_once: true
      delegate_to: localhost
      ansible.windows.win_powershell:
        script: |
          $all = ""

          {% for host in ansible_play_hosts %}
          $all += "{{ hostvars[host].html_per_host.stdout }}"
          {% endfor %}

          $final = @"
          <html>
          <body>
          <h1>Windows Fleet Disk Report</h1>
          $all
          </body>
          </html>
          "@

          $final | Out-File C:\temp\fleet_report.html -Encoding UTF8

          $final
      register: final_report

    # =========================
    # 4. SEND EMAIL (KEEP YOUR WORKING METHOD)
    # =========================
    - name: Send fleet email via Windows SMTP
      run_once: true
      ansible.windows.win_powershell:
        script: |
          $body = @"
          {{ final_report.stdout }}
          "@

          $secpasswd = ConvertTo-SecureString "{{ gmail_app_password }}" -AsPlainText -Force
          $cred = New-Object System.Management.Automation.PSCredential ("{{ gmail_username }}", $secpasswd)

          Send-MailMessage `
            -From "{{ gmail_username }}" `
            -To "{{ email_to }}" `
            -Subject "Windows Fleet Disk Report" `
            -Body $body `
            -BodyAsHtml `
            -SmtpServer "smtp.gmail.com" `
            -Port 587 `
            -UseSSL `
            -Credential $cred

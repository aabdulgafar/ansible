---
- name: Windows Fleet Health Check (ONE Email Summary)
  hosts: all
  gather_facts: no

  vars:
    gmail_username: "aabdulgafar2015@gmail.com"
    gmail_app_password: "mako ezhe ippy payz"
    email_to: "aabdulgafar2015@gmail.com"
    report_path: "C:\\temp\\fleet_health_report.html"

    critical_services:
      - Spooler
      - wuauserv
      - bits
      - WinRM

  tasks:

    # =========================
    # 1. ENSURE TEMP DIRECTORY
    # =========================
    - name: Ensure temp directory exists
      ansible.windows.win_file:
        path: C:\temp
        state: directory

    # =========================
    # 2. DISK INFO
    # =========================
    - name: Get disk information
      ansible.windows.win_shell: |
        Get-CimInstance Win32_LogicalDisk -Filter "DriveType=3" |
        Select-Object DeviceID,
          @{N="SizeGB";E={[math]::Round($_.Size/1GB,2)}},
          @{N="FreeGB";E={[math]::Round($_.FreeSpace/1GB,2)}},
          @{N="FreePct";E={[math]::Round(($_.FreeSpace/$_.Size)*100,2)}} |
        ConvertTo-Json -Depth 2
      register: disk_raw

    # =========================
    # 3. CPU + MEMORY
    # =========================
    - name: Get CPU and memory info
      ansible.windows.win_shell: |
        $cpu = Get-CimInstance Win32_Processor | Measure-Object LoadPercentage -Average
        $mem = Get-CimInstance Win32_OperatingSystem

        [PSCustomObject]@{
          CPU = $cpu.Average
          TotalMemoryGB = [math]::Round($mem.TotalVisibleMemorySize/1MB,2)
          FreeMemoryGB  = [math]::Round($mem.FreePhysicalMemory/1MB,2)
          FreeMemoryPct = [math]::Round(($mem.FreePhysicalMemory/$mem.TotalVisibleMemorySize)*100,2)
        } | ConvertTo-Json
      register: sys_raw

    # =========================
    # 4. CRITICAL SERVICES
    # =========================
    - name: Check critical services
      ansible.windows.win_service_info:
        name: "{{ item }}"
      loop: "{{ critical_services }}"
      register: svc_info

    # =========================
    # 5. BUILD HTML PER HOST
    # =========================
    - name: Build host HTML report
      ansible.windows.win_shell: |
        $disk = '{{ disk_raw.stdout }}' | ConvertFrom-Json
        $sys  = '{{ sys_raw.stdout }}' | ConvertFrom-Json

        $html = @"
        <h2>Server: $env:COMPUTERNAME</h2>

        <h3>CPU & Memory</h3>
        <p>CPU: $($sys.CPU)%</p>
        <p>Memory Free: $($sys.FreeMemoryGB) GB ($($sys.FreeMemoryPct)%)</p>

        <h3>Disk</h3>
        <table border="1">
        <tr><th>Drive</th><th>Total</th><th>Free</th><th>%</th></tr>
        "@

        foreach ($d in $disk) {
          $color = if ($d.FreePct -lt 15) { "style='color:red;font-weight:bold;'" } else { "" }

          $html += "<tr>
            <td>$($d.DeviceID)</td>
            <td>$($d.SizeGB)</td>
            <td>$($d.FreeGB)</td>
            <td $color>$($d.FreePct)</td>
          </tr>"
        }

        $html += "</table><h3>Services</h3><ul>"

        $services = '{{ svc_info.results | to_json }}' | ConvertFrom-Json
        foreach ($s in $services) {
          $state = $s.services[0].state
          $color = if ($state -ne "running") { "style='color:red;'" } else { "" }

          $html += "<li $color>$($s.item) - $state</li>"
        }

        $html += "</ul>"

        Set-Content -Path "{{ report_path }}" -Value $html
      register: html_result

    # =========================
    # 6. BUILD GLOBAL REPORT (RUN ONCE)
    # =========================
    - name: Build fleet-wide report
      delegate_to: localhost
      run_once: true
      ansible.builtin.shell: |
        $content = @"
        <html>
        <body>
        <h1>Windows Fleet Health Report</h1>

        {% for host in ansible_play_hosts %}
        <hr>
        <h2>{{ host }}</h2>

        <pre>{{ hostvars[host].disk_raw.stdout }}</pre>
        <pre>{{ hostvars[host].sys_raw.stdout }}</pre>
        <pre>{{ hostvars[host].svc_info.results | to_nice_json }}</pre>

        {% endfor %}

        </body>
        </html>
        "@

        $content | Out-File "/tmp/fleet_health_report.html"
      args:
        executable: /bin/bash

    # =========================
    # 7. SEND ONE EMAIL (FIXED)
    # =========================
    - name: Send ONE consolidated email
      delegate_to: localhost
      run_once: true
      community.general.mail:
        host: smtp.gmail.com
        port: 587
        username: "{{ gmail_username }}"
        password: "{{ gmail_app_password }}"
        to: "{{ email_to }}"
        subject: "Windows Fleet Health Report (ALL SERVERS)"
        body: "{{ lookup('file', '/tmp/fleet_health_report.html') }}"
        subtype: html
        secure: starttls

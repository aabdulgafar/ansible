---
- name: Windows Fleet Health Check (ONE Email Summary - AWX Safe)
  hosts: all
  gather_facts: no

  vars:
    gmail_username: "aabdulgafar2015@gmail.com"
    gmail_app_password: "mako ezhe ippy payz"
    email_to: "aabdulgafar2015@gmail.com"

    report_path: "/tmp/fleet_health_report.html"

    critical_services:
      - Spooler
      - wuauserv
      - bits
      - WinRM

  tasks:

    # =========================
    # 1. DISK INFO
    # =========================
    - name: Get disk information
      ansible.windows.win_shell: |
        Get-CimInstance Win32_LogicalDisk -Filter "DriveType=3" |
        Select-Object DeviceID,
          @{N="SizeGB";E={[math]::Round($_.Size/1GB,2)}},
          @{N="FreeGB";E={[math]::Round($_.FreeSpace/1GB,2)}},
          @{N="FreePct";E={[math]::Round(($_.FreeSpace/$_.Size)*100,2)}} |
        ConvertTo-Json -Depth 2
      register: disk_raw

    # =========================
    # 2. CPU + MEMORY
    # =========================
    - name: Get CPU and memory info
      ansible.windows.win_shell: |
        $cpu = Get-CimInstance Win32_Processor | Measure-Object LoadPercentage -Average
        $mem = Get-CimInstance Win32_OperatingSystem

        [PSCustomObject]@{
          CPU = $cpu.Average
          TotalMemoryGB = [math]::Round($mem.TotalVisibleMemorySize/1MB,2)
          FreeMemoryGB  = [math]::Round($mem.FreePhysicalMemory/1MB,2)
          FreeMemoryPct = [math]::Round(($mem.FreePhysicalMemory/$mem.TotalVisibleMemorySize)*100,2)
        } | ConvertTo-Json
      register: sys_raw

    # =========================
    # 3. CRITICAL SERVICES CHECK
    # =========================
    - name: Check critical services
      ansible.windows.win_service_info:
        name: "{{ item }}"
      loop: "{{ critical_services }}"
      register: svc_info

    # =========================
    # 4. BUILD GLOBAL HTML REPORT (ALL SERVERS)
    # =========================
    - name: Generate fleet-wide HTML report
      delegate_to: localhost
      run_once: true
      ansible.builtin.shell: |
        cat <<EOF > {{ report_path }}
        <html>
        <body style="font-family: Arial;">
        <h1>Windows Fleet Health Report</h1>

        {% for host in ansible_play_hosts %}

        <hr>
        <h2>Server: {{ host }}</h2>

        <h3>Disk</h3>
        <pre>{{ hostvars[host].disk_raw.stdout }}</pre>

        <h3>System</h3>
        <pre>{{ hostvars[host].sys_raw.stdout }}</pre>

        <h3>Services</h3>
        <pre>{{ hostvars[host].svc_info.results | to_nice_json }}</pre>

        {% endfor %}

        </body>
        </html>
        EOF
      args:
        executable: /bin/bash

    # =========================
    # 5. SEND ONE EMAIL (FIXED - NO COMMUNITY MODULE)
    # =========================
    - name: Send ONE consolidated email
      delegate_to: localhost
      run_once: true
      ansible.builtin.mail:
        host: smtp.gmail.com
        port: 587
        username: "{{ gmail_username }}"
        password: "{{ gmail_app_password }}"
        to: "{{ email_to }}"
        subject: "Windows Fleet Health Report (ALL SERVERS)"
        body: "{{ lookup('file', report_path) }}"
        subtype: html
        secure: starttls

---
- name: AWX Demo - Monitoring Portal Unified Local Simulation
  hosts: localhost
  connection: local
  gather_facts: false

  # 1. Dynamic Dependency Installer
  pre_tasks:
    - name: Download required community collections on the fly
      ansible.builtin.command: >
        ansible-galaxy collection install community.general ansible.windows --upgrade
      changed_when: false

  # 2. Variable Configurations
  vars:
    # Target database table name mapped to your local Windows test service
    table_service_mapping:
      - { table: "TB_MonitoringCollectionPortal", service: "Spooler" }
    
    # 4 Mock SMTP addresses for testing loops locally within WSL/Host network
    smtp_servers:
      - { host: "172.18.224.1", port: 25 }
      - { host: "smtp.invalid.local", port: 25 }
      - { host: "smtp2.invalid.local", port: 25 }
      - { host: "smtp3.invalid.local", port: 25 }

    # Local WinRM authentication variables to bypass the AWX dynamic inventory SSH configuration
    win_user: "YOUR_WINDOWS_USERNAME"     # <-- Replace with your Windows PC Username
    win_pass: "YOUR_WINDOWS_PASSWORD"     # <-- Replace with your Windows PC Password

  # 3. Playbook Tasks
  tasks:
    - name: 1. Test connectivity to SMTP servers
      ansible.builtin.wait_for:
        host: "{{ item.host }}"
        port: "{{ item.port }}"
        timeout: 2
      loop: "{{ smtp_servers }}"
      register: smtp_checks
      ignore_errors: true

    - name: 2. Query SQL Express via WSL Gateway IP
      community.general.mssql_query:
        login_host: "172.18.224.1"
        login_user: "{{ db_user }}"          # Injected automatically from your AWX DB Credential
        login_password: "{{ db_password }}"  # Injected automatically from your AWX DB Credential
        db: "AWX_Demo"
        query: "SELECT COUNT(*) FROM [{{ item.table }}];"
      loop: "{{ table_service_mapping }}"
      register: db_counts

    - name: 3. Restart Windows Print Spooler Service via Local WinRM Bridge
      ansible.windows.win_powershell:
        script: |
          $secpasswd = ConvertTo-SecureString "{{ win_pass }}" -AsPlainText -Force
          $cred = New-Object System.Management.Automation.PSCredential ("{{ win_user }}", $secpasswd)
          Invoke-Command -ComputerName "127.0.0.1" -Credential $cred -ScriptBlock {
              Restart-Service -Name "{{ item.item.service }}" -Force
          }
      loop: "{{ db_counts.results }}"
      when: item.query_result[0][0][''] | int > 500
      register: service_restart_results
      ignore_errors: true

    - name: 4. Send Email Alert via first available SMTP server
      community.general.mail:
        host: "{{ (smtp_checks.results | selectattribute('failed', 'none') | map(attribute='item') | first).host }}"
        port: "{{ (smtp_checks.results | selectattribute('failed', 'none') | map(attribute='item') | first).port }}"
        to: "your-email@company.com"
        subject: "AWX MONITORING ALERT: Threshold Exceeded"
        body: |
          AWX Local Simulation Report
          ===========================
          
          Network Diagnostic (SMTP Audit):
          --------------------------------
          {% for result in smtp_checks.results %}
          - {{ result.item.host }}:{{ result.item.port }} -> {% if result.failed %}FAILED (Unreachable){% else %}SUCCESS (Online){% endif %}
          {% endfor %}
          
          Action Executed Summary:
          ------------------------
          The following services were automatically restarted:
          {% for result in service_restart_results.results %}
          {% if result.not_changed is not defined %}
          - Windows Service: {{ result.item.item.service }} 
            Reason: Table [{{ result.item.item.table }}] has reached {{ result.item.query_result[0][0][''] }} rows (Threshold: 500).
          {% endif %}
          {% endfor %}
      when:
        - service_restart_results.changed or (service_restart_results.results | selectattribute('changed', true) | list | length > 0)
        - (smtp_checks.results | selectattribute('failed', 'none') | list | length) > 0

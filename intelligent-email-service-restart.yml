---
# Step 1: Boot up inside the AWX container to dynamically inject your Windows PC
- name: AWX Demo - Bootstrap Target Host
  hosts: localhost
  gather_facts: false
  connection: local
  tasks:
    - name: Dynamically add Windows PC to memory
      ansible.builtin.add_host:
        name: "my_windows_pc"
        ansible_host: "127.0.0.1"
        ansible_connection: winrm
        ansible_port: 5985
        ansible_winrm_transport: ntlm
        ansible_winrm_server_cert_validation: ignore

# Step 2: Switch execution over to the host we just forced into memory
- name: AWX Demo - Monitoring Portal Local Simulation
  hosts: my_windows_pc
  gather_facts: false
  vars:
    table_service_mapping:
      - { table: "TB_MonitoringCollectionPortal", service: "Spooler" }
    
    smtp_servers:
      - { host: "172.18.224.1", port: 25 }
      - { host: "smtp.invalid.local", port: 25 }
      - { host: "smtp2.invalid.local", port: 25 }
      - { host: "smtp3.invalid.local", port: 25 }

  tasks:
    - name: Test connectivity to SMTP servers
      ansible.builtin.wait_for:
        host: "{{ item.host }}"
        port: "{{ item.port }}"
        timeout: 2
      loop: "{{ smtp_servers }}"
      register: smtp_checks
      ignore_errors: true
      delegate_to: localhost
      become: false

    - name: Query SQL Express via WSL Gateway IP
      community.general.mssql_query:
        login_host: "172.18.224.1"
        login_user: "{{ db_user }}"
        login_password: "{{ db_password }}"
        db: "AWX_Demo"
        query: "SELECT COUNT(*) FROM [{{ item.table }}];"
      loop: "{{ table_service_mapping }}"
      register: db_counts
      delegate_to: localhost
      become: false

    - name: Restart Windows Print Spooler Service if Count over 500
      ansible.windows.win_service:
        name: "{{ item.item.service }}"
        state: restarted
      loop: "{{ db_counts.results }}"
      when: item.query_result[0][0][''] | int > 500
      register: service_restart_results

    - name: Send Email Alert via first available SMTP server
      community.general.mail:
        host: "{{ (smtp_checks.results | selectattribute('failed', 'none') | map(attribute='item') | first).host }}"
        port: "{{ (smtp_checks.results | selectattribute('failed', 'none') | map(attribute='item') | first).port }}"
        to: "your-email@company.com"
        subject: "AWX MONITORING ALERT: Threshold Exceeded"
        body: |
          AWX Local Simulation Report
          ===========================
          
          Network Diagnostic (SMTP Audit):
          --------------------------------
          {% for result in smtp_checks.results %}
          - {{ result.item.host }}:{{ result.item.port }} -> {% if result.failed %}FAILED (Unreachable){% else %}SUCCESS (Online){% endif %}
          {% endfor %}
          
          Action Executed Summary:
          ------------------------
          The following services were automatically restarted:
          {% for result in service_restart_results.results %}
          {% if result.changed %}
          - Windows Service: {{ result.item.item.service }} 
            Reason: Table [{{ result.item.item.table }}] has reached {{ result.query_result[0][0][''] }} rows (Threshold: 500).
          {% endif %}
          {% endfor %}
      delegate_to: localhost
      when:
        - service_restart_results.changed
        - (smtp_checks.results | selectattribute('failed', 'none') | list | length) > 0

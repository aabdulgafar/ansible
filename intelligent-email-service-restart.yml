---
- name: AWX Demo - Monitoring Portal Production-Safe Simulation
  hosts: localhost
  connection: local
  gather_facts: false

  vars:
    # Target database configuration
    db_server: "127.0.0.1"
    db_name: "AWX_Demo"
    table_name: "TB_MonitoringCollectionPortal"
    service_name: "Spooler"

    # 4 Mock SMTP addresses for testing loops locally
    smtp_servers:
      - { host: "172.18.224.1", port: 25 }
      - { host: "smtp.invalid.local", port: 25 }
      - { host: "smtp2.invalid.local", port: 25 }
      - { host: "smtp3.invalid.local", port: 25 }

    # Explicit Windows OS authentication variables
    win_user: "YOUR_WINDOWS_USERNAME"     # <-- Replace with your PC Username
    win_pass: "YOUR_WINDOWS_PASSWORD"     # <-- Replace with your PC Password

  tasks:
    - name: 1. Test connectivity to SMTP servers
      ansible.builtin.wait_for:
        host: "{{ item.host }}"
        port: "{{ item.port }}"
        timeout: 2
      loop: "{{ smtp_servers }}"
      register: smtp_checks
      ignore_errors: true

    - name: 2. Execute SQL Query and Service Control via Native Windows PowerShell Bridge
      ansible.windows.win_powershell:
        script: |
          # Create credentials to bridge from WSL to Windows Host over WinRM
          $secpasswd = ConvertTo-SecureString "{{ win_pass }}" -AsPlainText -Force
          $cred = New-Object System.Management.Automation.PSCredential ("{{ win_user }}", $secpasswd)
          
          # Script block executed natively on the Windows Target
          $params = @{
              ComputerName = "127.0.0.1"
              Credential = $cred
              ScriptBlock = {
                  # Build connection string to local SQL Express
                  $connString = "Server={{ db_server }};Database={{ db_name }};User Id={{ db_user }};Password={{ db_password }};TrustServerCertificate=True;"
                  $connection = New-Object System.Data.SqlClient.SqlConnection($connString)
                  
                  # Formulate SQL Query safely
                  $query = "SELECT COUNT(*) FROM [{{ table_name }}];"
                  $command = New-Object System.Data.SqlClient.SqlCommand($query, $connection)
                  
                  # Execute connection and fetch row count natively
                  $connection.Open()
                  $rowCount = $command.ExecuteScalar()
                  $connection.Close()
                  
                  # Logic check: Restart service if threshold is breached
                  $actionTaken = $false
                  if ([int]$rowCount -gt 500) {
                      Restart-Service -Name "{{ service_name }}" -Force
                      $actionTaken = $true
                  }
                  
                  # Output structured data back to Ansible
                  return @{
                      RowCount = $rowCount
                      ServiceRestarted = $actionTaken
                  }
              }
          }
          
          Invoke-Command @params
      register: script_output

    - name: 3. Send Email Alert via Built-in Mail Client
      ansible.builtin.mail:
        host: "{{ (smtp_checks.results | selectattribute('failed', 'none') | map(attribute='item') | first).host }}"
        port: "{{ (smtp_checks.results | selectattribute('failed', 'none') | map(attribute='item') | first).port }}"
        to: "your-email@company.com"
        subject: "AWX MONITORING ALERT: Threshold Exceeded"
        body: |
          AWX Production Simulation Report
          =================================
          
          Network Diagnostic (SMTP Audit):
          --------------------------------
          {% for result in smtp_checks.results %}
          - {{ result.item.host }}:{{ result.item.port }} -> {% if result.failed %}FAILED (Unreachable){% else %}SUCCESS (Online){% endif %}
          {% endfor %}
          
          Action Executed Summary:
          ------------------------
          - Monitored Table: {{ table_name }}
          - Current Row Count: {{ script_output.output.RowCount }}
          - Service Restart Action Triggered: {{ script_output.output.ServiceRestarted }}
      when:
        - script_output.output.ServiceRestarted == true
        - (smtp_checks.results | selectattribute('failed', 'none') | list | length) > 0

---
- name: Windows Log Management and Archiving (Mapped Paths)
  hosts: all
  gather_facts: no

  vars:
    log_mappings: "{{ log_mappings }}"
    age_threshold: "{{ age_threshold }}"

  tasks:
    - name: Find logs older than threshold across mapped directories
      ansible.windows.win_find:
        paths: "{{ log_mappings | map(attribute='source') | list }}"
        patterns: ['*.log', '*.txt']
        age: "{{ age_threshold }}"
        recurse: yes
      register: found_logs

    - name: Process, Archive, and Clean Logs to Predefined Paths
      ansible.windows.win_shell: |
        # 1. Force found files into a solid array
        $foundFiles = @($env:FOUND_LOGS_JSON | ConvertFrom-Json)
        if ($foundFiles.Count -eq 0) { 
            Write-Output "No logs found matching criteria."; exit 0 
        }

        # 2. Reconstruct the mapping dictionary inside PowerShell safely using regex_replace
        $mappings = @(
        {% for map in log_mappings %}
          [PSCustomObject]@{ 
              Source = "{{ map.source | regex_replace('\\\\', '\\\\') }}"; 
              Target = "{{ map.target | regex_replace('\\\\', '\\\\') }}" 
          }{{ "," if not loop.last }}
        {% endfor %}
        )

        # 3. Iterate through each predefined mapping
        foreach ($map in $mappings) {
            $sourceDir = $map.Source.TrimEnd('\') + '\'
            $targetDir = $map.Target

            # Filter files strictly belonging to this source directory
            # Exclude files already inside the specified target path to prevent loops
            $filesInDir = @($foundFiles | Where-Object { 
                $_.path.StartsWith($sourceDir, [System.StringComparison]::OrdinalIgnoreCase) -and 
                $_.path -notlike "*$targetDir*" 
            })

            if ($filesInDir.Count -eq 0) { 
                Write-Output "No matching files for source: $sourceDir"
                continue 
            }

            # 4. Ensure the predefined backup path folder exists
            if (-not (Test-Path -Path $targetDir)) {
                New-Item -ItemType Directory -Path $targetDir -Force | Out-Null
            }

            # 5. Generate zip archive path and execute compression
            $zipFile = Join-Path $targetDir "$((Get-Date -Format 'yyyy-MM-dd'))_logs.zip"
            $filePaths = @($filesInDir | ForEach-Object { $_.path })

            Write-Output "Archiving $($filePaths.Count) files from $sourceDir into $zipFile..."
            Compress-Archive -Path $filePaths -DestinationPath $zipFile -Update

            # 6. Delete original files only on successful archive validation
            if (Test-Path -Path $zipFile) {
                foreach ($file in $filePaths) {
                    Remove-Item -Path $file -Force
                }
                Write-Output "Successfully archived and cleaned $sourceDir"
            } else {
                Write-Error "Failed to verify zip file creation for $targetDir"
            }
        }
      environment:
        FOUND_LOGS_JSON: "{{ found_logs.files | to_json }}"
      when: found_logs.matched > 0
      register: archive_output

    - name: Display execution summary
      ansible.builtin.debug:
        msg: "{{ archive_output.stdout_lines }}"
      when: archive_output.stdout_lines is defined

---
- name: Windows Log Management and Archiving (In-Place Single File)
  hosts: all
  gather_facts: no

  vars:
    log_dirs: "{{ log_dirs }}" 
    age_threshold: "{{ age_threshold }}"
    archive_folder_name: "ansible-compressedlogs"

  tasks:
    - name: Find logs older than threshold across multiple directories
      ansible.windows.win_find:
        paths: "{{ log_dirs }}"
        patterns: ['*.log', '*.txt']
        age: "{{ age_threshold }}"
        recurse: yes
      register: found_logs

    - name: Process, Archive, and Clean Logs In-Place
      ansible.windows.win_shell: |
        # 1. Parse the JSON list of files found by Ansible
        $foundFiles = @"
        {{ found_logs.files | to_json }}
        "@ | ConvertFrom-Json

        if (-not $foundFiles) { 
            Write-Output "No logs found matching criteria."; exit 0 
        }

        # 2. Group files by their base log directory to keep things isolated
        # Exclude any files already inside an 'ansible-compressedlogs' folder
        $targetFolder = "{{ archive_folder_name }}"
        $logDirs = @(
        {% for dir in log_dirs %}
          "{{ dir }}"{{ "," if not loop.last }}
        {% endfor %}
        )

        foreach ($dir in $logDirs) {
            # Filter files belonging to this specific root directory path
            $filesInDir = $foundFiles | Where-Object { 
                $_.path -like "$dir*" -and $_.path -notlike "*$targetFolder*" 
            }

            if ($filesInDir.Count -eq 0) { continue }

            # 3. Create the destination folder inside the current log directory
            $destDir = Join-Path $dir $targetFolder
            if (-not (Test-Path -Path $destDir)) {
                New-Item -ItemType Directory -Path $destDir | Out-Null
            }

            # 4. Compress the files
            $zipFile = Join-Path $destDir "$((Get-Date -Format 'yyyy-MM-dd'))_logs.zip"
            $filePaths = $filesInDir.path

            Compress-Archive -Path $filePaths -DestinationPath $zipFile -Update

            # 5. Verify the zip was created before deleting originals
            if (Test-Path -Path $zipFile) {
                foreach ($file in $filePaths) {
                    Remove-Item -Path $file -Force
                }
                Write-Output "Successfully archived and cleaned $($filesInDir.Count) files in $dir"
            }
        }
      when: found_logs.matched > 0
      register: archive_output

    - name: Display execution summary
      ansible.builtin.debug:
        msg: "{{ archive_output.stdout_lines }}"
      when: archive_output.stdout_lines is defined

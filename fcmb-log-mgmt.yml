---
- name: Windows Log Management and Archiving
  hosts: all
  gather_facts: no

  vars:
    log_dir: 'C:\inetpub\logs\LogFiles'
    archive_dir: 'C:\LogArchive'
    age_threshold: '7d'

  tasks:
    - name: Ensure archive directory exists
      ansible.windows.win_file:
        path: "{{ archive_dir }}"
        state: directory

    - name: Find logs older than threshold
      # FIXED: Changed from community.windows to ansible.windows
      ansible.windows.win_find:
        paths: "{{ log_dir }}"
        patterns: ['*.log', '*.txt']
        age: "{{ age_threshold }}"
        recurse: yes
      register: found_logs

    - name: Compress old logs using PowerShell
      # FIXED: Uses native Compress-Archive via win_shell instead of community module
      ansible.windows.win_shell: |
        $destFile = "{{ archive_dir }}\$(Get-Date -Format 'yyyy-MM-dd')_logs.zip"
        $files = @(
        {% for file in found_logs.files %}
          "{{ file.path }}"{{ "," if not loop.last }}
        {% endfor %}
        )
        Compress-Archive -Path $files -DestinationPath $destFile -Update
      when: found_logs.matched > 0
      register: zip_results

    - name: Remove original uncompressed logs after successful archiving
      ansible.windows.win_file:
        path: "{{ item.path }}"
        state: absent
      loop: "{{ found_logs.files }}"
      when: 
        - found_logs.matched > 0
        - zip_results is succeeded
